name: 小鶴神 Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        pip install aiohttp requests telethon python-telegram-bot python-socks
    
    - name: 创建目录
      run: |
        mkdir -p data/user_data data/sessions logs
    
    - name: 运行机器人
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
      run: |
        while true; do
          echo "🚀 启动小鶴神..."
          python bot.py
          echo "❌ 机器人崩溃，10秒后重启..."
          sleep 10
        done
