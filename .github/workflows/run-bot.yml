name: PC28 Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # 每 5 分钟触发一次，保持运行
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    # 关键：设置超时时间，让 bot 一直运行
    timeout-minutes: 350  # GitHub Actions 最大 360 分钟
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 创建目录
      run: |
        mkdir -p user_data telegram_sessions
    
    - name: 运行机器人
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
      run: |
        # 使用循环让 bot 持续运行
        while true; do
          python bot.py || echo "Bot crashed, restarting..."
          sleep 5
        done
